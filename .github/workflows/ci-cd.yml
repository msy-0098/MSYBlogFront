name: Frontend CI/CD

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  verify:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Upload frontend artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  deploy:
    name: Deploy Frontend
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Prepare SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload and activate frontend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          SSH_OPTIONS="-p ${DEPLOY_PORT} -o IdentitiesOnly=yes"

          ssh ${SSH_OPTIONS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p /var/www/blog/releases/${RELEASE_ID}"

          rsync -az --delete \
            -e "ssh ${SSH_OPTIONS}" \
            dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/blog/releases/${RELEASE_ID}/"

          ssh ${SSH_OPTIONS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "ln -sfnT /var/www/blog/releases/${RELEASE_ID} /var/www/blog/current"
